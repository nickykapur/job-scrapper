name: Start Claude Azure VM

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"   # 08:00 Dublin time

jobs:
  start-vm:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Start Claude VM
        run: |
          az vm start \
            --resource-group calude-vm_group \
            --name calude-vm
